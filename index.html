<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GrandGDPS Demonlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GrandGDPS demonlist</h1>
    <div id="list"></div>

    <script>
        // Данные теперь прямо здесь
        const levels = [
            { "id": 101, "pos": 1, "name": "Society", "author": "Neomarbilan" },
            { "id": 102, "pos": 2, "name": "Tidal Wave", "author": "OniLink" },
            { "id": 103, "pos": 3, "name": "Acheron", "author": "ryamu" }
            ]
    

        const list = document.getElementById('list');
        list.innerHTML = levels.map(item => `
            <div class="level-card">
                <h3>#${item.pos} ${item.name}</h3>
                <p>Автор: ${item.author} | ID: ${item.id}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
