<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GrandGDPS Demonlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GrandGDPS demonlist</h1>
    <div id="list"></div>

    <script>
        // Этот код загружает JSON и рисует его
        fetch('levels.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('list');
                list.innerHTML = data.map(item => `
                    <div class="level-card">
                        <h3>#${item.pos} ${item.name}</h3>
                        <p>Автор: ${item.author} | ID: ${item.id}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
